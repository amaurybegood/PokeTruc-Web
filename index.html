<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéTruc — Pokémon Cards with Exclusive Illustrations</title>
  <meta name="description" content="Discover Pokémon TCG cards with unique and exclusive artwork illustrations only available in one language (Japanese, English, Chinese). Free, ad-free, fan-made.">
  <meta name="keywords" content="Pokémon, TCG, cards, exclusive, Japanese, English, Chinese, illustration, tracker, collector">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Open Graph -->
  <meta property="og:title" content="PokéTruc — Pokémon Cards with Exclusive Illustrations">
  <meta property="og:description" content="Discover Pokémon TCG cards with unique and exclusive artwork illustrations only available in one language. Free, ad-free, fan-made.">
  <meta property="og:image" content="https://amaurybegood.github.io/PokeTruc-Web/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://amaurybegood.github.io/PokeTruc-Web/">

  <link rel="canonical" href="https://amaurybegood.github.io/PokeTruc-Web/">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

  <header>
    <a href="index.html"><img src="logo.png" alt="PokéTruc" class="site-logo"></a>
    <h1>PokéTruc</h1>
    <p class="subtitle" data-i18n="subtitle">Exclusive Pokémon card illustrations</p>
    <nav class="site-nav">
      <a href="index.html" class="active" data-i18n="dex">Dex</a>
      <a href="info.html" data-i18n="info">Info</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
    </nav>
    <div class="search-row">
      <input type="search" id="search" data-i18n-placeholder="search.placeholder" placeholder="Search a Pokémon..." autocomplete="off">
    </div>
  </header>

  <div id="stats-bar" class="stats-bar"></div>

  <main>
    <div id="loader" class="loader">
      <div class="loader-spinner"></div>
    </div>
    <div id="pokemon-grid"></div>
  </main>

  <footer>
    <p>© 2026 PokéTruc — Fan-made, not affiliated with Nintendo / The Pokémon Company.</p>
  </footer>

  <!-- Modal detail -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Fullscreen card -->
  <div id="fullscreen" class="fullscreen hidden">
    <div class="fullscreen-backdrop"></div>
    <img id="fullscreen-img" src="" alt="">
  </div>

  <noscript>
    <style>#loader { display: none; }</style>
    <p style="text-align:center;padding:64px 24px;color:#6e6e73;">JavaScript is required to use PokéTruc.</p>
  </noscript>

  <script data-goatcounter="https://poketruc.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script src="i18n.js?v=8"></script>
  <script src="app.js?v=8"></script>
  <script src="theme.js?v=8"></script>
</body>
</html>
